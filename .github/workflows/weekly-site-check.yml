name: Weekly website check

on:
  schedule:
    # Every day at 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run site health checks
        id: site_check
        continue-on-error: true
        run: bash scripts/weekly-site-check.sh

      - name: Send Discord report
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHECK_OUTCOME: ${{ steps.site_check.outcome }}
        run: bash scripts/post-discord-report.sh
