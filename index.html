<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
    }
    /* Sidebar */
    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #A50044, #004D98); /* Barça red to blue */
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      height: 100vh;
    }
    .sidebar img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 20px;
      border: 3px solid #FFD700; /* gold accent */
    }
    .nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .nav li {
      margin: 15px 0;
    }
    .nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav a:hover {
      color: #FFD700; /* gold hover */
    }
    .socials {
      margin-top: auto;
      display: flex;
      gap: 15px;
    }
    .socials a {
      color: #fff;
      font-size: 20px;
      transition: color 0.3s;
    }
    .socials a:hover {
      color: #FFD700;
    }
    /* Main content */
    .main {
      flex: 1;
      padding: 60px;
      position: relative;
    }
    .code-snippet {
      font-family: 'Courier New', monospace;
      background: #222;
      color: #0f0;
      padding: 20px;
      border-radius: 8px;
      max-width: 600px;
    }
    .cta {
      margin-top: 30px;
    }
    .cta button {
      background: #A50044; /* Barça red */
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .cta button:hover {
      background: #004D98; /* Barça blue */
    }
    .read-more {
      margin-top: 20px;
      display: inline-block;
      color: #004D98;
      text-decoration: none;
      font-weight: bold;
    }
    /* Icons area */
    .icons {
      position: absolute;
      bottom: 40px;
      display: flex;
      gap: 20px;
    }
    .icons img {
      width: 40px;
      height: 40px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <img src="my-pic.jpeg" alt="Profile">
    <ul class="nav">
      <li><a href="#">Home</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Who am I?</a></li>
      <li><a href="#">FR</a></li>
    </ul>
    <div class="socials">
      <a href="#">IG</a>
      <a href="#">IN</a>
      <a href="#">BE</a>
    </div>
  </div>
  <div class="main">
    <div class="code-snippet">
      <p>01 &lt; Hi, I'm Rashdan! &gt;</p>
      <p>02 &lt; I design ✏️ and develop 💻 websites. &gt;</p>
      <p>03 &lt; I also design branding, logos... &gt;</p>
    </div>
    <div class="cta">
      <button>Work with me</button>
    </div>
    <a href="#" class="read-more">Read more ↓</a>
    <div class="icons">
      <img src="html5.png" alt="HTML5">
      <img src="css.png" alt="CSS">
      <img src="js.png" alt="JavaScript">
      <img src="wordpress.png" alt="WordPress">
      <img src="xd.png" alt="Adobe XD">
    </div>
  </div>
</body>
</html>
