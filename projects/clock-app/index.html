<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="clock-wrap">
      <p class="badge">Mini Project</p>
      <h1>Clock App</h1>
      <p class="subtitle">Live time and date</p>

      <section class="clock-card" aria-live="polite">
        <p id="date" class="date"></p>
        <p id="time" class="time"></p>
      </section>

      <div class="actions">
        <button id="toggleFormat" type="button">Switch to 24-hour</button>
        <a href="../../index.html#projects">Back to Portfolio</a>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
