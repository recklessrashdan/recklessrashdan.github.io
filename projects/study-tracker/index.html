<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Study Tracker</h1>
      <p class="sub">Track homework and learning goals.</p>

      <form id="taskForm">
        <input id="taskInput" type="text" placeholder="Add a task (e.g. Math revision)" required />
        <button type="submit">Add</button>
      </form>

      <ul id="taskList"></ul>

      <div class="actions">
        <button id="clearDone" type="button">Clear Completed</button>
        <a href="../../index.html#projects">Back to Portfolio</a>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
